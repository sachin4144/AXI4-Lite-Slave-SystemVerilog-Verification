<svg viewBox="0 0 3000 1400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="3000" height="1400" fill="#ffffff"/>

  <!-- Title -->
  <text x="1500" y="95" text-anchor="middle" font-size="46" font-weight="700" fill="#1a1a1a">
    AXI4-Lite SystemVerilog Verification Architecture
  </text>
  <text x="1500" y="140" text-anchor="middle" font-size="22" fill="#555555">
    Class-Based SystemVerilog Verification Environment &#8212; Horizontal Pipeline View
  </text>
  <line x1="300" y1="168" x2="2700" y2="168" stroke="#aaaaaa" stroke-width="2"/>

  <!-- ===================== Marker defs ===================== -->
  <defs>
    <marker id="arrowSolid" markerWidth="20" markerHeight="20" refX="14" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,12 L16,6 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowDashed" markerWidth="20" markerHeight="20" refX="14" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,12 L16,6 z" fill="#6b6b6b"/>
    </marker>
  </defs>

  <!-- ===================== Group background panels ===================== -->
  <rect x="110" y="300" width="925" height="550" rx="14" fill="#f4f7fa" stroke="#cfd8e3" stroke-width="2" stroke-dasharray="10,6"/>
  <text x="140" y="340" font-size="23" font-weight="700" fill="#33475b" letter-spacing="1">1 &#183; STIMULUS GENERATION</text>

  <rect x="1035" y="300" width="930" height="550" rx="14" fill="#f4f7fa" stroke="#cfd8e3" stroke-width="2" stroke-dasharray="10,6"/>
  <text x="1065" y="340" font-size="23" font-weight="700" fill="#33475b" letter-spacing="1">2 &#183; DUT BOUNDARY</text>

  <rect x="1965" y="300" width="935" height="550" rx="14" fill="#f4f7fa" stroke="#cfd8e3" stroke-width="2" stroke-dasharray="10,6"/>
  <text x="1995" y="340" font-size="23" font-weight="700" fill="#33475b" letter-spacing="1">3 &#183; RESPONSE CHECKING</text>

  <!-- ===================== Main horizontal pipeline (y center = 700) ===================== -->

  <!-- 1. Generator -->
  <rect x="150" y="630" width="220" height="140" rx="10" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="260" y="710" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">Generator</text>

  <line x1="370" y1="700" x2="450" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 2. Mailbox (G->D) -->
  <rect x="460" y="630" width="220" height="140" rx="10" fill="#eef1f4" stroke="#33475b" stroke-width="3"/>
  <text x="570" y="700" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">Mailbox</text>
  <text x="570" y="732" text-anchor="middle" font-size="16" fill="#444444">(Generator &#8594; Driver)</text>

  <line x1="680" y1="700" x2="760" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 3. Driver -->
  <rect x="770" y="630" width="220" height="140" rx="10" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="880" y="710" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">Driver</text>

  <line x1="990" y1="700" x2="1070" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 4. AXI4-Lite Interface -->
  <rect x="1080" y="630" width="220" height="140" rx="10" fill="#f2f2f2" stroke="#33475b" stroke-width="3" stroke-dasharray="12,7"/>
  <text x="1190" y="700" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">AXI4-Lite</text>
  <text x="1190" y="728" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Interface</text>

  <line x1="1300" y1="700" x2="1380" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 5. DUT (emphasized) -->
  <rect x="1390" y="610" width="220" height="180" rx="10" fill="#c9d6e3" stroke="#1a1a1a" stroke-width="4"/>
  <text x="1500" y="690" text-anchor="middle" font-size="25" font-weight="700" fill="#1a1a1a">AXI4-Lite</text>
  <text x="1500" y="722" text-anchor="middle" font-size="25" font-weight="700" fill="#1a1a1a">Slave DUT</text>

  <line x1="1610" y1="700" x2="1690" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 6. AXI4-Lite Interface -->
  <rect x="1700" y="630" width="220" height="140" rx="10" fill="#f2f2f2" stroke="#33475b" stroke-width="3" stroke-dasharray="12,7"/>
  <text x="1810" y="700" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">AXI4-Lite</text>
  <text x="1810" y="728" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Interface</text>

  <line x1="1920" y1="700" x2="2000" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 7. Monitor -->
  <rect x="2010" y="630" width="220" height="140" rx="10" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="2120" y="710" text-anchor="middle" font-size="27" font-weight="700" fill="#1a1a1a">Monitor</text>

  <line x1="2230" y1="700" x2="2310" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 8. Mailbox (M->S) -->
  <rect x="2320" y="630" width="220" height="140" rx="10" fill="#eef1f4" stroke="#33475b" stroke-width="3"/>
  <text x="2430" y="700" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">Mailbox</text>
  <text x="2430" y="732" text-anchor="middle" font-size="16" fill="#444444">(Monitor &#8594; Scoreboard)</text>

  <line x1="2540" y1="700" x2="2620" y2="700" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- 9. Scoreboard -->
  <rect x="2630" y="630" width="220" height="140" rx="10" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="2740" y="710" text-anchor="middle" font-size="25" font-weight="700" fill="#1a1a1a">Scoreboard</text>

  <!-- ===================== Top annotations ===================== -->

  <!-- Assertions (above DUT) -->
  <rect x="1350" y="340" width="300" height="110" rx="10" fill="#f7f2e7" stroke="#8a6d1d" stroke-width="3"/>
  <text x="1500" y="385" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">SystemVerilog</text>
  <text x="1500" y="415" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Assertions (SVA)</text>
  <line x1="1500" y1="450" x2="1500" y2="602" stroke="#6b6b6b" stroke-width="4" stroke-dasharray="14,8" marker-end="url(#arrowDashed)"/>

  <!-- Functional Coverage (above Monitor) -->
  <rect x="1970" y="340" width="300" height="110" rx="10" fill="#f7f2e7" stroke="#8a6d1d" stroke-width="3"/>
  <text x="2120" y="385" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Functional</text>
  <text x="2120" y="415" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Coverage</text>
  <line x1="2120" y1="450" x2="2120" y2="622" stroke="#6b6b6b" stroke-width="4" stroke-dasharray="14,8" marker-end="url(#arrowDashed)"/>

  <!-- ===================== Legend (bottom-right) ===================== -->
  <rect x="2350" y="900" width="550" height="340" rx="12" fill="#ffffff" stroke="#999999" stroke-width="2"/>
  <text x="2375" y="940" font-size="22" font-weight="700" fill="#1a1a1a">Legend</text>
  <line x1="2375" y1="955" x2="2870" y2="955" stroke="#cccccc" stroke-width="1.5"/>

  <rect x="2375" y="975" width="30" height="30" fill="#dce6f1" stroke="#33475b" stroke-width="2"/>
  <text x="2418" y="998" font-size="18" fill="#333333">Verification Component</text>

  <rect x="2375" y="1020" width="30" height="30" fill="#f2f2f2" stroke="#33475b" stroke-width="2.5" stroke-dasharray="7,4"/>
  <text x="2418" y="1043" font-size="18" fill="#333333">Interface (Signal Connectivity)</text>

  <rect x="2375" y="1065" width="30" height="30" fill="#c9d6e3" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="2418" y="1088" font-size="18" fill="#333333">Design Under Test (DUT)</text>

  <rect x="2375" y="1110" width="30" height="30" fill="#f7f2e7" stroke="#8a6d1d" stroke-width="2"/>
  <text x="2418" y="1133" font-size="18" fill="#333333">Assertions / Coverage (Passive)</text>

  <line x1="2375" y1="1160" x2="2415" y2="1160" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>
  <text x="2430" y="1166" font-size="18" fill="#333333">Data / Transaction Flow</text>

  <line x1="2375" y1="1200" x2="2415" y2="1200" stroke="#6b6b6b" stroke-width="4" stroke-dasharray="10,6" marker-end="url(#arrowDashed)"/>
  <text x="2430" y="1206" font-size="18" fill="#333333">Passive Monitoring Connection</text>

  <!-- Footer -->
  <text x="1500" y="1370" text-anchor="middle" font-size="18" fill="#888888">
    AXI4-Lite Slave Verification Environment &#8212; SystemVerilog Class-Based Testbench
  </text>

</svg>
