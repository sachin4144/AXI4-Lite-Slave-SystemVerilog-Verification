<svg viewBox="0 0 3000 1600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="3000" height="1600" fill="#ffffff"/>

  <!-- Title -->
  <text x="1500" y="90" text-anchor="middle" font-size="46" font-weight="700" fill="#1a1a1a">
    AXI4-Lite Slave RTL Architecture
  </text>
  <text x="1500" y="134" text-anchor="middle" font-size="22" fill="#555555">
    Verilog HDL Micro-Architecture &#8212; Write / Read Datapath
  </text>
  <line x1="250" y1="160" x2="2750" y2="160" stroke="#aaaaaa" stroke-width="2"/>

  <!-- ===================== Marker defs ===================== -->
  <defs>
    <marker id="arrowSolid" markerWidth="20" markerHeight="20" refX="14" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,12 L16,6 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowGray" markerWidth="16" markerHeight="16" refX="11" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10 L13,5 z" fill="#777777"/>
    </marker>
  </defs>

  <!-- ===================== Outer RTL module container ===================== -->
  <rect x="350" y="460" width="2300" height="660" rx="14" fill="none" stroke="#b8b8b8" stroke-width="2.5" stroke-dasharray="12,7"/>
  <text x="378" y="492" font-size="21" font-weight="700" fill="#666666">AXI4-Lite Slave &#8212; Top Module (RTL)</text>

  <!-- Global clock / reset distribution -->
  <line x1="390" y1="445" x2="2610" y2="445" stroke="#999999" stroke-width="2" stroke-dasharray="9,5"/>
  <text x="1500" y="435" text-anchor="middle" font-size="18" fill="#777777">ACLK , ARESETN &#8212; Global Clock &amp; Reset Distribution</text>
  <line x1="540" y1="445" x2="540" y2="465" stroke="#999999" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="900" y1="445" x2="900" y2="465" stroke="#999999" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="1320" y1="445" x2="1320" y2="465" stroke="#999999" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="1740" y1="445" x2="1740" y2="465" stroke="#999999" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="2100" y1="445" x2="2100" y2="465" stroke="#999999" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="2460" y1="445" x2="2460" y2="465" stroke="#999999" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- ===================== Left signal port box (Inputs) ===================== -->
  <rect x="80" y="560" width="250" height="480" rx="10" fill="#fbfbfb" stroke="#555555" stroke-width="2.5"/>
  <text x="205" y="600" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">AXI4-Lite Inputs</text>
  <line x1="105" y1="614" x2="305" y2="614" stroke="#cccccc" stroke-width="1.5"/>
  <g font-size="20" fill="#222222" font-family="Consolas, Menlo, monospace">
    <text x="120" y="648">AWVALID</text>
    <text x="120" y="684">AWADDR</text>
    <text x="120" y="720">WVALID</text>
    <text x="120" y="756">WDATA</text>
    <text x="120" y="792">BREADY</text>
    <text x="120" y="828">ARVALID</text>
    <text x="120" y="864">ARADDR</text>
    <text x="120" y="900">RREADY</text>
    <text x="120" y="944" font-weight="700">ACLK</text>
    <text x="120" y="980" font-weight="700">ARESETN</text>
  </g>

  <line x1="330" y1="800" x2="380" y2="800" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- ===================== Right signal port box (Outputs) ===================== -->
  <rect x="2670" y="560" width="250" height="480" rx="10" fill="#fbfbfb" stroke="#555555" stroke-width="2.5"/>
  <text x="2795" y="600" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">AXI4-Lite Outputs</text>
  <line x1="2695" y1="614" x2="2895" y2="614" stroke="#cccccc" stroke-width="1.5"/>
  <g font-size="20" fill="#222222" font-family="Consolas, Menlo, monospace">
    <text x="2710" y="654">AWREADY</text>
    <text x="2710" y="696">WREADY</text>
    <text x="2710" y="738">BRESP</text>
    <text x="2710" y="780">BVALID</text>
    <text x="2710" y="822">ARREADY</text>
    <text x="2710" y="864">RDATA</text>
    <text x="2710" y="906">RRESP</text>
    <text x="2710" y="948">RVALID</text>
  </g>

  <line x1="2620" y1="800" x2="2670" y2="800" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- ===================== 1. AXI4-Lite Interface ===================== -->
  <rect x="390" y="670" width="300" height="260" rx="10" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="540" y="770" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">AXI4-Lite</text>
  <text x="540" y="802" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Interface</text>
  <text x="540" y="838" text-anchor="middle" font-size="17" fill="#444444">Signal Reception &amp;</text>
  <text x="540" y="860" text-anchor="middle" font-size="17" fill="#444444">Channel Decode</text>

  <line x1="690" y1="800" x2="740" y2="800" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- ===================== 2. FSM Controller ===================== -->
  <rect x="750" y="670" width="300" height="260" rx="10" fill="#e6dcf1" stroke="#5b3384" stroke-width="3"/>
  <text x="900" y="770" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">FSM</text>
  <text x="900" y="802" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Controller</text>
  <text x="900" y="838" text-anchor="middle" font-size="17" fill="#444444">Write Path /</text>
  <text x="900" y="860" text-anchor="middle" font-size="17" fill="#444444">Read Path Control</text>

  <!-- Branch from FSM to Write lane and Read lane -->
  <polyline points="1050,800 1080,800 1080,595 1110,595" fill="none" stroke="#1a1a1a" stroke-width="4.5" marker-end="url(#arrowSolid)"/>
  <polyline points="1050,800 1080,800 1080,1005 1210,1005" fill="none" stroke="#1a1a1a" stroke-width="4.5" marker-end="url(#arrowSolid)"/>
  <text x="1000" y="670" font-size="18" font-style="italic" fill="#5b3384">write ctrl</text>
  <text x="1000" y="950" font-size="18" font-style="italic" fill="#5b3384">read ctrl</text>

  <!-- Lane labels -->
  <text x="1320" y="500" text-anchor="middle" font-size="20" font-weight="700" letter-spacing="1" fill="#2f6b45">WRITE PATH</text>
  <text x="1320" y="1112" text-anchor="middle" font-size="20" font-weight="700" letter-spacing="1" fill="#2f6b45">READ PATH</text>

  <!-- ===================== 3. Write Address Register ===================== -->
  <rect x="1110" y="520" width="200" height="150" rx="10" fill="#dcefe1" stroke="#2f6b45" stroke-width="3"/>
  <text x="1210" y="583" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Write Address</text>
  <text x="1210" y="609" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Register</text>
  <text x="1210" y="635" text-anchor="middle" font-size="15" fill="#444444">stores AWADDR</text>

  <line x1="1310" y1="595" x2="1330" y2="595" stroke="#1a1a1a" stroke-width="4.5" marker-end="url(#arrowSolid)"/>

  <!-- ===================== 4. Write Data Register ===================== -->
  <rect x="1330" y="520" width="200" height="150" rx="10" fill="#dcefe1" stroke="#2f6b45" stroke-width="3"/>
  <text x="1430" y="583" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Write Data</text>
  <text x="1430" y="609" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Register</text>
  <text x="1430" y="635" text-anchor="middle" font-size="15" fill="#444444">stores WDATA</text>

  <!-- Write Data Register -> Memory (upper entry) -->
  <polyline points="1530,595 1560,595 1560,740 1590,740" fill="none" stroke="#1a1a1a" stroke-width="4.5" marker-end="url(#arrowSolid)"/>
  <text x="1565" y="720" font-size="16" font-style="italic" fill="#2f6b45">write</text>

  <!-- ===================== 5. Read Address Register ===================== -->
  <rect x="1210" y="930" width="220" height="150" rx="10" fill="#dcefe1" stroke="#2f6b45" stroke-width="3"/>
  <text x="1320" y="993" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Read Address</text>
  <text x="1320" y="1019" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">Register</text>
  <text x="1320" y="1045" text-anchor="middle" font-size="15" fill="#444444">stores ARADDR</text>

  <!-- Read Address Register -> Memory (lower entry) -->
  <polyline points="1430,1005 1560,1005 1560,860 1590,860" fill="none" stroke="#1a1a1a" stroke-width="4.5" marker-end="url(#arrowSolid)"/>
  <text x="1565" y="885" font-size="16" font-style="italic" fill="#2f6b45">read</text>

  <!-- ===================== 6. Memory Array ===================== -->
  <rect x="1590" y="670" width="300" height="260" rx="10" fill="#f7ecd9" stroke="#8a6d1d" stroke-width="3.5"/>
  <text x="1740" y="775" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Memory Array</text>
  <text x="1740" y="815" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">128 &#215; 32</text>
  <text x="1740" y="850" text-anchor="middle" font-size="16" fill="#444444">Synchronous R/W</text>

  <line x1="1890" y1="800" x2="1940" y2="800" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>
  <text x="1895" y="785" font-size="16" font-style="italic" fill="#777777">RDATA / ACK</text>

  <!-- ===================== 7. Response Generator ===================== -->
  <rect x="1950" y="670" width="300" height="260" rx="10" fill="#f8dede" stroke="#8a2f2f" stroke-width="3"/>
  <text x="2100" y="775" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Response</text>
  <text x="2100" y="807" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Generator</text>
  <text x="2100" y="843" text-anchor="middle" font-size="17" fill="#444444">BRESP , RRESP</text>

  <line x1="2250" y1="800" x2="2300" y2="800" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>

  <!-- ===================== 8. Output Logic ===================== -->
  <rect x="2310" y="670" width="300" height="260" rx="10" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="2460" y="770" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Output</text>
  <text x="2460" y="802" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Logic</text>
  <text x="2460" y="838" text-anchor="middle" font-size="16" fill="#444444">RDATA, xREADY,</text>
  <text x="2460" y="860" text-anchor="middle" font-size="16" fill="#444444">xVALID</text>

  <!-- ===================== Legend (bottom-right) ===================== -->
  <rect x="2330" y="1180" width="590" height="360" rx="12" fill="#ffffff" stroke="#999999" stroke-width="2"/>
  <text x="2355" y="1222" font-size="23" font-weight="700" fill="#1a1a1a">Legend</text>
  <line x1="2355" y1="1236" x2="2895" y2="1236" stroke="#cccccc" stroke-width="1.5"/>

  <rect x="2355" y="1254" width="30" height="30" fill="#dce6f1" stroke="#33475b" stroke-width="2"/>
  <text x="2398" y="1277" font-size="19" fill="#333333">Interface / Output Logic</text>

  <rect x="2355" y="1298" width="30" height="30" fill="#e6dcf1" stroke="#5b3384" stroke-width="2"/>
  <text x="2398" y="1321" font-size="19" fill="#333333">FSM Controller</text>

  <rect x="2355" y="1342" width="30" height="30" fill="#dcefe1" stroke="#2f6b45" stroke-width="2"/>
  <text x="2398" y="1365" font-size="19" fill="#333333">Address / Data Registers</text>

  <rect x="2355" y="1386" width="30" height="30" fill="#f7ecd9" stroke="#8a6d1d" stroke-width="2"/>
  <text x="2398" y="1409" font-size="19" fill="#333333">Memory Array</text>

  <rect x="2355" y="1430" width="30" height="30" fill="#f8dede" stroke="#8a2f2f" stroke-width="2"/>
  <text x="2398" y="1453" font-size="19" fill="#333333">Response Generator</text>

  <line x1="2355" y1="1490" x2="2400" y2="1490" stroke="#1a1a1a" stroke-width="5" marker-end="url(#arrowSolid)"/>
  <text x="2412" y="1496" font-size="19" fill="#333333">Datapath / Control Flow</text>

  <!-- Footer -->
  <text x="1500" y="1580" text-anchor="middle" font-size="18" fill="#888888">
    AXI4-Lite Slave Interface &#8212; Verilog HDL RTL Block Diagram
  </text>

</svg>
