<svg viewBox="0 0 950 1080" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="950" height="1080" fill="#ffffff"/>

  <!-- Title -->
  <text x="475" y="45" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">
    AXI4-Lite SystemVerilog Verification Architecture
  </text>
  <line x1="175" y1="60" x2="775" y2="60" stroke="#999999" stroke-width="1"/>

  <!-- ===================== Arrow marker defs ===================== -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666666"/>
    </marker>
  </defs>

  <!-- ===================== Main vertical pipeline ===================== -->
  <!-- Common block style: fill light blue-gray, stroke dark gray -->

  <!-- Generator -->
  <rect x="230" y="85" width="240" height="60" rx="6" fill="#dce6f1" stroke="#33475b" stroke-width="1.5"/>
  <text x="350" y="120" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Generator</text>

  <!-- Arrow: Generator -> Mailbox1 -->
  <line x1="350" y1="145" x2="350" y2="180" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mailbox (Generator -> Driver) -->
  <rect x="200" y="180" width="300" height="55" rx="6" fill="#eef1f4" stroke="#33475b" stroke-width="1.5"/>
  <text x="350" y="211" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Mailbox</text>
  <text x="350" y="228" text-anchor="middle" font-size="11.5" fill="#444444">(Generator &#8594; Driver)</text>

  <!-- Arrow: Mailbox1 -> Driver -->
  <line x1="350" y1="235" x2="350" y2="270" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Driver -->
  <rect x="230" y="270" width="240" height="60" rx="6" fill="#dce6f1" stroke="#33475b" stroke-width="1.5"/>
  <text x="350" y="305" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Driver</text>

  <!-- Arrow: Driver -> AXI Interface (top) -->
  <line x1="350" y1="330" x2="350" y2="365" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AXI Interface (top) -->
  <rect x="200" y="365" width="300" height="55" rx="6" fill="#f2f2f2" stroke="#33475b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="350" y="398" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">AXI4-Lite Interface</text>

  <!-- Arrow: AXI Interface (top) -> DUT -->
  <line x1="350" y1="420" x2="350" y2="455" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DUT -->
  <rect x="200" y="455" width="300" height="90" rx="6" fill="#c9d6e3" stroke="#1a1a1a" stroke-width="2"/>
  <text x="350" y="495" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">AXI4-Lite Slave</text>
  <text x="350" y="516" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">DUT</text>

  <!-- Arrow: DUT -> AXI Interface (bottom) -->
  <line x1="350" y1="545" x2="350" y2="580" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AXI Interface (bottom) -->
  <rect x="200" y="580" width="300" height="55" rx="6" fill="#f2f2f2" stroke="#33475b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="350" y="613" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">AXI4-Lite Interface</text>

  <!-- Arrow: AXI Interface (bottom) -> Monitor -->
  <line x1="350" y1="635" x2="350" y2="670" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Monitor -->
  <rect x="230" y="670" width="240" height="60" rx="6" fill="#dce6f1" stroke="#33475b" stroke-width="1.5"/>
  <text x="350" y="705" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Monitor</text>

  <!-- Arrow: Monitor -> Mailbox2 -->
  <line x1="350" y1="730" x2="350" y2="765" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Mailbox (Monitor -> Scoreboard) -->
  <rect x="200" y="765" width="300" height="55" rx="6" fill="#eef1f4" stroke="#33475b" stroke-width="1.5"/>
  <text x="350" y="796" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">Mailbox</text>
  <text x="350" y="813" text-anchor="middle" font-size="11.5" fill="#444444">(Monitor &#8594; Scoreboard)</text>

  <!-- Arrow: Mailbox2 -> Scoreboard -->
  <line x1="350" y1="820" x2="350" y2="855" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Scoreboard -->
  <rect x="230" y="855" width="240" height="60" rx="6" fill="#dce6f1" stroke="#33475b" stroke-width="1.5"/>
  <text x="350" y="890" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Scoreboard</text>

  <!-- ===================== Side branch: Assertions -> DUT ===================== -->
  <rect x="640" y="465" width="230" height="70" rx="6" fill="#f7f2e7" stroke="#8a6d1d" stroke-width="1.5"/>
  <text x="755" y="493" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1a1a1a">SystemVerilog</text>
  <text x="755" y="511" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1a1a1a">Assertions (SVA)</text>

  <!-- connector: Assertions -> DUT (dashed, bidirectional monitoring style) -->
  <line x1="640" y1="500" x2="500" y2="500" stroke="#666666" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowGray)"/>

  <!-- ===================== Side branch: Functional Coverage -> Monitor ===================== -->
  <rect x="640" y="665" width="230" height="70" rx="6" fill="#f7f2e7" stroke="#8a6d1d" stroke-width="1.5"/>
  <text x="755" y="693" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1a1a1a">Functional</text>
  <text x="755" y="711" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1a1a1a">Coverage</text>

  <!-- connector: Functional Coverage -> Monitor -->
  <line x1="640" y1="700" x2="500" y2="700" stroke="#666666" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowGray)"/>

  <!-- ===================== Legend ===================== -->
  <rect x="60" y="965" width="16" height="16" fill="#dce6f1" stroke="#33475b" stroke-width="1"/>
  <text x="84" y="978" font-size="12.5" fill="#333333">Verification Component (Class-based)</text>

  <rect x="60" y="990" width="16" height="16" fill="#f2f2f2" stroke="#33475b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="84" y="1003" font-size="12.5" fill="#333333">Interface (signal connectivity)</text>

  <rect x="400" y="965" width="16" height="16" fill="#c9d6e3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="424" y="978" font-size="12.5" fill="#333333">Design Under Test (DUT)</text>

  <rect x="400" y="990" width="16" height="16" fill="#f7f2e7" stroke="#8a6d1d" stroke-width="1"/>
  <text x="424" y="1003" font-size="12.5" fill="#333333">Assertions / Coverage (Passive checks)</text>

  <!-- Footer -->
  <text x="475" y="1050" text-anchor="middle" font-size="11" fill="#888888">
    AXI4-Lite Slave Verification Environment &#8212; SystemVerilog Class-Based Testbench
  </text>

</svg>
