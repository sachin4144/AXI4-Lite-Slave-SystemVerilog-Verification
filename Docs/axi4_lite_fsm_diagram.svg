<svg viewBox="0 0 3000 1600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="3000" height="1600" fill="#ffffff"/>

  <!-- Title -->
  <text x="1500" y="90" text-anchor="middle" font-size="46" font-weight="700" fill="#1a1a1a">
    AXI4-Lite Slave RTL Finite State Machine (FSM)
  </text>
  <text x="1500" y="134" text-anchor="middle" font-size="22" fill="#555555">
    Write Path (Left) &amp; Read Path (Right) &#8212; State Transition Diagram
  </text>
  <line x1="250" y1="160" x2="2750" y2="160" stroke="#aaaaaa" stroke-width="2"/>

  <!-- ===================== Marker defs ===================== -->
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="11" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10 L13,5 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- ===================== IDLE (shared top state) ===================== -->
  <rect x="1350" y="190" width="300" height="100" rx="18" fill="#e9e9e9" stroke="#444444" stroke-width="3.5"/>
  <text x="1500" y="250" text-anchor="middle" font-size="28" font-weight="700" fill="#1a1a1a">IDLE</text>

  <!-- Lane labels -->
  <text x="800" y="345" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="1" fill="#33475b">WRITE PATH</text>
  <text x="2200" y="345" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="1" fill="#2f6b45">READ PATH</text>

  <!-- IDLE -> write / read entry -->
  <line x1="1400" y1="290" x2="940" y2="378" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1130" y="325" font-size="18" fill="#333333">AWVALID</text>

  <line x1="1600" y1="290" x2="2060" y2="378" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1780" y="325" font-size="18" fill="#333333">ARVALID</text>

  <!-- =========================================================== -->
  <!-- ============  WRITE PATH (left side, x-center 800) ========= -->
  <!-- =========================================================== -->

  <!-- SEND_WRITE_ADDRESS_ACK -->
  <rect x="650" y="380" width="300" height="90" rx="14" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="800" y="434" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">SEND_WRITE_</text>
  <text x="800" y="458" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">ADDRESS_ACK</text>

  <line x1="800" y1="470" x2="800" y2="568" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="815" y="525" font-size="18" fill="#333333">WVALID</text>

  <!-- SEND_WRITE_DATA_ACK -->
  <rect x="650" y="570" width="300" height="90" rx="14" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="800" y="614" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">SEND_WRITE_</text>
  <text x="800" y="638" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">DATA_ACK</text>

  <line x1="800" y1="660" x2="800" y2="738" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Decision 1: Address < 128 ? -->
  <polygon points="800,740 950,810 800,880 650,810" fill="#fdf3d0" stroke="#8a6d1d" stroke-width="3"/>
  <text x="800" y="800" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Address</text>
  <text x="800" y="822" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">&lt; 128 ?</text>

  <!-- Decision1 YES -> UPDATE_MEMORY -->
  <line x1="800" y1="880" x2="800" y2="948" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="815" y="920" font-size="17" fill="#2f6b45">YES: Address &lt; 128</text>

  <!-- Decision1 NO -> SEND_WRITE_ERROR -->
  <polyline points="650,810 420,810 420,948" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="430" y="800" font-size="17" fill="#8a2f2f">NO: Address &#8805; 128</text>

  <!-- UPDATE_MEMORY -->
  <rect x="650" y="950" width="300" height="90" rx="14" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="800" y="1004" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a1a">UPDATE_MEMORY</text>

  <line x1="800" y1="1040" x2="800" y2="1138" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- SEND_WRITE_RESPONSE -->
  <rect x="650" y="1140" width="300" height="90" rx="14" fill="#dce6f1" stroke="#33475b" stroke-width="3"/>
  <text x="800" y="1184" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">SEND_WRITE_</text>
  <text x="800" y="1208" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">RESPONSE</text>

  <line x1="800" y1="1230" x2="800" y2="1298" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Decision 2: BREADY? (main) -->
  <polygon points="800,1300 950,1370 800,1440 650,1370" fill="#fdf3d0" stroke="#8a6d1d" stroke-width="3"/>
  <text x="800" y="1378" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">BREADY ?</text>

  <!-- Decision2 NO -> loop back into SEND_WRITE_RESPONSE -->
  <polyline points="650,1370 600,1370 600,1185 650,1185" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="440" y="1280" font-size="17" fill="#8a2f2f">NO: !BREADY (stay)</text>

  <!-- Decision2 YES -> back to IDLE -->
  <polyline points="950,1370 1080,1370 1080,230 1350,230" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1090" y="1360" font-size="17" fill="#2f6b45">YES: BREADY &#8594; IDLE</text>

  <!-- SEND_WRITE_ERROR -->
  <rect x="270" y="950" width="300" height="90" rx="14" fill="#f8dede" stroke="#8a2f2f" stroke-width="3"/>
  <text x="420" y="1004" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">SEND_WRITE_ERROR</text>

  <line x1="420" y1="1040" x2="420" y2="1298" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Decision 3: BREADY? (error) -->
  <polygon points="420,1300 570,1370 420,1440 270,1370" fill="#fdf3d0" stroke="#8a6d1d" stroke-width="3"/>
  <text x="420" y="1378" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">BREADY ?</text>

  <!-- Decision3 NO -> loop back into SEND_WRITE_ERROR -->
  <polyline points="270,1370 220,1370 220,995 270,995" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="20" y="1180" font-size="17" fill="#8a2f2f">NO: !BREADY (stay)</text>

  <!-- Decision3 YES -> back to IDLE -->
  <polyline points="570,1370 1020,1370 1020,255 1350,255" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="600" y="1450" font-size="17" fill="#2f6b45">YES: BREADY &#8594; IDLE</text>

  <!-- =========================================================== -->
  <!-- ============  READ PATH (right side, x-center 2200) ======== -->
  <!-- =========================================================== -->

  <!-- SEND_READ_ADDRESS_ACK -->
  <rect x="2050" y="380" width="300" height="90" rx="14" fill="#dcefe1" stroke="#2f6b45" stroke-width="3"/>
  <text x="2200" y="434" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">SEND_READ_</text>
  <text x="2200" y="458" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">ADDRESS_ACK</text>

  <line x1="2200" y1="470" x2="2200" y2="608" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Decision 1: Address < 128 ? -->
  <polygon points="2200,610 2350,680 2200,750 2050,680" fill="#fdf3d0" stroke="#8a6d1d" stroke-width="3"/>
  <text x="2200" y="670" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Address</text>
  <text x="2200" y="692" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">&lt; 128 ?</text>

  <!-- Decision1 YES -> GENERATE_READ_DATA -->
  <line x1="2200" y1="750" x2="2200" y2="848" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="2215" y="800" font-size="17" fill="#2f6b45">YES: Address &lt; 128</text>

  <!-- Decision1 NO -> SEND_READ_ERROR -->
  <polyline points="2350,680 2580,680 2580,848" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="2400" y="670" font-size="17" fill="#8a2f2f">NO: Address &#8805; 128</text>

  <!-- GENERATE_READ_DATA -->
  <rect x="2050" y="850" width="300" height="90" rx="14" fill="#dcefe1" stroke="#2f6b45" stroke-width="3"/>
  <text x="2200" y="895" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">GENERATE_</text>
  <text x="2200" y="919" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">READ_DATA</text>

  <!-- self loop: Count < 2 -->
  <path d="M 2350,872 C 2430,872 2430,918 2350,918" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="2437" y="900" font-size="16" fill="#2f6b45">Count &lt; 2</text>

  <line x1="2200" y1="940" x2="2200" y2="1058" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="2215" y="1005" font-size="17" fill="#333333">Count == 2 / RVALID</text>

  <!-- Decision 2: RREADY? (main) -->
  <polygon points="2200,1060 2350,1130 2200,1200 2050,1130" fill="#fdf3d0" stroke="#8a6d1d" stroke-width="3"/>
  <text x="2200" y="1138" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">RREADY ?</text>

  <!-- Decision2 NO -> loop back into GENERATE_READ_DATA -->
  <polyline points="2050,1130 2000,1130 2000,895 2050,895" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1780" y="1040" font-size="17" fill="#8a2f2f">NO: !RREADY (stay)</text>

  <!-- Decision2 YES -> back to IDLE -->
  <polyline points="2350,1130 2850,1130 2850,255 1650,255" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="2400" y="1120" font-size="17" fill="#2f6b45">YES: RREADY &#8594; IDLE</text>

  <!-- SEND_READ_ERROR -->
  <rect x="2430" y="850" width="300" height="90" rx="14" fill="#f8dede" stroke="#8a2f2f" stroke-width="3"/>
  <text x="2580" y="904" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">SEND_READ_ERROR</text>

  <line x1="2580" y1="940" x2="2580" y2="1058" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Decision 3: RREADY? (error) -->
  <polygon points="2580,1060 2730,1130 2580,1200 2430,1130" fill="#fdf3d0" stroke="#8a6d1d" stroke-width="3"/>
  <text x="2580" y="1138" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">RREADY ?</text>

  <!-- Decision3 NO -> loop back into SEND_READ_ERROR -->
  <polyline points="2430,1130 2380,1130 2380,895 2430,895" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="2270" y="1040" font-size="17" fill="#8a2f2f">NO: !RREADY (stay)</text>

  <!-- Decision3 YES -> back to IDLE -->
  <polyline points="2730,1130 2900,1130 2900,225 1650,225" fill="none" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="2750" y="1210" font-size="17" fill="#2f6b45">YES: RREADY &#8594; IDLE</text>

  <!-- ===================== Legend (bottom-right) ===================== -->
  <rect x="2330" y="1300" width="590" height="260" rx="12" fill="#ffffff" stroke="#999999" stroke-width="2"/>
  <text x="2355" y="1340" font-size="22" font-weight="700" fill="#1a1a1a">Legend</text>
  <line x1="2355" y1="1352" x2="2895" y2="1352" stroke="#cccccc" stroke-width="1.5"/>

  <rect x="2355" y="1368" width="28" height="28" fill="#e9e9e9" stroke="#444444" stroke-width="2"/>
  <text x="2396" y="1390" font-size="18" fill="#333333">Idle State</text>

  <rect x="2355" y="1406" width="28" height="28" fill="#dce6f1" stroke="#33475b" stroke-width="2"/>
  <text x="2396" y="1428" font-size="18" fill="#333333">Write Path States</text>

  <rect x="2355" y="1444" width="28" height="28" fill="#dcefe1" stroke="#2f6b45" stroke-width="2"/>
  <text x="2396" y="1466" font-size="18" fill="#333333">Read Path States</text>

  <polygon points="2369,1478 2383,1492 2369,1506 2355,1492" fill="#fdf3d0" stroke="#8a6d1d" stroke-width="2"/>
  <text x="2396" y="1498" font-size="18" fill="#333333">Decision Node</text>

  <rect x="2609" y="1368" width="28" height="28" fill="#f8dede" stroke="#8a2f2f" stroke-width="2"/>
  <text x="2650" y="1390" font-size="18" fill="#333333">Error State</text>

  <!-- Footer -->
  <text x="1500" y="1585" text-anchor="middle" font-size="18" fill="#888888">
    AXI4-Lite Slave Interface &#8212; Verilog HDL RTL Finite State Machine
  </text>

</svg>
